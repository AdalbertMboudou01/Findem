# --- Configuration Docker (utilise les variables du .env) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/assistant_prequalification}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:assistant_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:assistant_password}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
server.port=${SERVER_PORT:8000}

# Configuration JWT
jwt.secret=${JWT_SECRET:your-secret-key-here-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Durcissement securite
app.features.bootstrap-test-enabled=${APP_FEATURES_BOOTSTRAP_TEST_ENABLED:false}
app.invitation.expose-token=${APP_INVITATION_EXPOSE_TOKEN:false}

# Configuration Upload
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

# Configuration Email
app.email.host=${APP_EMAIL_HOST:smtp.gmail.com}
app.email.port=${APP_EMAIL_PORT:587}
app.email.username=${APP_EMAIL_USERNAME:adalbertmboudou100@gmail.com}
app.email.password=${APP_EMAIL_PASSWORD:}
app.email.from=${APP_EMAIL_FROM:adalbertmboudou100@gmail.com}

# Configuration Frontend
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3100}

# Configuration IA generique (OpenAI-compatible API)
app.ai.enabled=${APP_AI_ENABLED:${APP_SEMANTIC_EXTRACTOR_ENABLED:false}}
app.ai.base-url=${APP_AI_BASE_URL:${APP_SEMANTIC_EXTRACTOR_BASE_URL:https://api.openai.com}}
app.ai.api-key=${APP_AI_API_KEY:${APP_SEMANTIC_EXTRACTOR_API_KEY:}}
app.ai.model=${APP_AI_MODEL:${APP_SEMANTIC_EXTRACTOR_MODEL:gpt-4o-mini}}

# Configuration extracteur semantique NLP/LLM.
# Kept for compatibility and for semantic extraction specific behavior.
app.semantic-extractor.enabled=${APP_SEMANTIC_EXTRACTOR_ENABLED:false}
app.semantic-extractor.base-url=${APP_SEMANTIC_EXTRACTOR_BASE_URL:https://api.openai.com}
app.semantic-extractor.api-key=${APP_SEMANTIC_EXTRACTOR_API_KEY:}
app.semantic-extractor.model=${APP_SEMANTIC_EXTRACTOR_MODEL:gpt-4o-mini}
app.semantic-extractor.require-llm=${APP_SEMANTIC_EXTRACTOR_REQUIRE_LLM:true}
