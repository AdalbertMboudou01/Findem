# Configuration pour Docker
spring.datasource.url=jdbc:postgresql://db:5432/assistant_prequalification
spring.datasource.username=assistant_user
spring.datasource.password=assistant_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8000

# Configuration JWT
jwt.secret=your-secret-key-here-change-in-production
jwt.expiration=86400000

# Configuration Upload
app.upload.dir=./uploads
