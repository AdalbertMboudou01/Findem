version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8100:8000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/assistant_prequalification
      - SPRING_DATASOURCE_USERNAME=assistant_user
      - SPRING_DATASOURCE_PASSWORD=assistant_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=your-secret-key-here-change-in-production
      - JWT_EXPIRATION=86400000
    volumes:
      - ./backend:/app
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "3100:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: assistant_prequalification
      POSTGRES_USER: assistant_user
      POSTGRES_PASSWORD: assistant_password
    ports:
      - "55432:5432"
    volumes:
      - ./backend/migrations:/docker-entrypoint-initdb.d
