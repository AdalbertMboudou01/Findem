services:
  backend:
    build: ./backend
    ports:
      - "8100:8000"
    env_file:
      - .env
    environment:
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "3100:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8100
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  uploads_data: