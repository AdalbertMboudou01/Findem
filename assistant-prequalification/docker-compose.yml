version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8100:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "3100:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "55432:5432"
    volumes:
      - ./backend/migrations:/docker-entrypoint-initdb.d
